<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To-Do App</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header class="app-header">
      <h1>My Tasks</h1>
      <p class="subtitle">Stay organized, one task at a time</p>
    </header>

    <form id="task-form" class="task-form" autocomplete="off">
      <input
        type="text"
        id="task-input"
        placeholder="What do you need to do?"
        aria-label="New task"
        maxlength="120"
      />
      <button type="submit" id="add-btn">Add</button>
    </form>

    <ul id="task-list" class="task-list" aria-live="polite"></ul>

    <footer class="app-footer">
      <span id="task-count">0 tasks</span>
      <button type="button" id="clear-completed" class="clear-btn" hidden>
        Clear completed
      </button>
    </footer>
  </main>

  <script src="script.js"></script>
</body>
</html>
